<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="apple-touch-icon" href="icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="범초하우스">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>범초하우스 가계부</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
html{-webkit-text-size-adjust:100%}
input[type=number]{-moz-appearance:textfield}
/* ⑦ 테마 변수 */
:root{
  --bg:#f9f8f6;--surface:#fff;--surface2:#f3f2ef;
  --text:#1a1a1a;--text2:#555;--text3:#999;
  --border:#e8e6e0;--border2:#d0cec8;
  --purple:#7F77DD;--purple-light:#EEEDFE;--purple-dark:#534AB7;
  --green:#3B6D11;--green-light:#EAF3DE;
  --red:#A32D2D;--red-light:#FCEBEB;
  --amber:#854F0B;--amber-light:#FAEEDA;
  --blue:#185FA5;--blue-light:#E6F1FB;
  --teal:#0F6E56;--teal-light:#E1F5EE;
  --radius:10px;--radius-lg:14px;
}
body.dark{
  --bg:#1a1917;--surface:#242320;--surface2:#2e2d29;
  --text:#f0ede8;--text2:#a09d96;--text3:#6b6860;
  --border:#38352f;--border2:#4a4740;
  --purple:#AFA9EC;--purple-light:#26215C;--purple-dark:#CECBF6;
  --green:#97C459;--green-light:#173404;
  --red:#F09595;--red-light:#501313;
  --amber:#EF9F27;--amber-light:#412402;
  --blue:#85B7EB;--blue-light:#042C53;
  --teal:#5DCAA5;--teal-light:#04342C;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.6;min-height:100vh;transition:background .2s,color .2s}
.app{display:flex;min-height:100vh;width:100vw;overflow:hidden}
.sidebar{width:220px;min-width:220px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;transition:background .2s}
.logo{padding:20px 20px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.logo-text{font-size:16px;font-weight:700}
.logo-sub{font-size:11px;color:var(--text3);margin-top:1px}
/* ⑦ 테마 토글 버튼 */
.theme-btn{border:1px solid var(--border2);background:var(--surface2);border-radius:20px;padding:4px 10px;font-size:11px;cursor:pointer;color:var(--text2);white-space:nowrap;transition:all .15s}
.theme-btn:hover{background:var(--purple-light);color:var(--purple-dark)}
.nav{padding:10px 10px;flex:1}
.nav-item{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:var(--radius);cursor:pointer;font-size:14px;color:var(--text2);margin-bottom:2px;border:none;background:none;width:100%;text-align:left;transition:all .15s}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--purple-light);color:var(--purple-dark);font-weight:500}
.nav-icon{width:18px;height:18px;opacity:.7;flex-shrink:0}
.nav-item.active .nav-icon{opacity:1}
.main{flex:1;min-width:0;overflow-y:auto;overflow-x:hidden;background:var(--bg)}
.inner{max-width:1200px;margin:0 auto}
.page{display:none;padding:28px 32px;box-sizing:border-box;max-width:900px}
.page.active{display:block}
.page-title{font-size:22px;font-weight:700;margin-bottom:4px}
.page-sub{font-size:13px;color:var(--text3);margin-bottom:22px}
.g4{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:12px;margin-bottom:20px}
.g3{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:16px}
.g2{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px;margin-bottom:16px}
.metric{background:var(--surface2);border-radius:var(--radius);padding:16px}
.metric-label{font-size:12px;color:var(--text3);margin-bottom:5px}
.metric-value{font-size:22px;font-weight:700;letter-spacing:-.5px}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;margin-bottom:16px;transition:background .2s}
.card-title{font-size:15px;font-weight:600;margin-bottom:14px}
.row2{display:flex;gap:16px;margin-bottom:16px}
.row2 .card{flex:1;margin-bottom:0}
label{font-size:13px;color:var(--text2);display:block;margin-bottom:4px}
input,select,textarea{width:100%;padding:9px 12px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);color:var(--text);font-size:14px;outline:none;transition:border .15s;font-family:inherit}
input:focus,select:focus{border-color:var(--purple)}
.fg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.fg2{display:grid;grid-template-columns:2fr 1fr;gap:12px;margin-bottom:16px}
.btn{padding:9px 18px;border-radius:var(--radius);border:1px solid var(--border2);background:var(--surface);color:var(--text);font-size:14px;cursor:pointer;font-weight:500;transition:all .15s}
.btn:hover{background:var(--surface2)}
.btn-p{background:var(--purple);color:#fff;border-color:var(--purple)}
.btn-p:hover{background:var(--purple-dark)}
.btn-sm{padding:5px 10px;font-size:12px}
.btn-ghost{border:none;background:none;color:var(--text3);padding:4px 8px;cursor:pointer;font-size:15px}
.btn-ghost:hover{color:var(--red)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;padding:8px 10px;color:var(--text3);font-weight:500;border-bottom:1px solid var(--border);font-size:12px}
td{padding:9px 10px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface2)}
.pw{background:var(--surface2);border-radius:20px;height:8px;overflow:hidden;flex:1}
.pb{height:100%;border-radius:20px;transition:width .4s}
.ok{background:var(--green)}.warn{background:var(--amber)}.over{background:var(--red)}.blue-bar{background:var(--blue)}
.alert{padding:11px 15px;border-radius:var(--radius);font-size:13px;margin-bottom:12px}
.aw{background:var(--amber-light);color:var(--amber);border:1px solid #EF9F2744}
.ad{background:var(--red-light);color:var(--red);border:1px solid #E24B4A44}
.ag{background:var(--green-light);color:var(--green);border:1px solid #3B6D1133}
.divider{height:1px;background:var(--border);margin:14px 0}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-hd{text-align:center;font-size:11px;font-weight:500;color:var(--text3);padding:5px 0}
.cal-cell{border-radius:7px;padding:7px 5px;min-height:66px;border:1px solid var(--border);background:var(--surface);font-size:11px}
.cal-day{font-size:12px;font-weight:600;margin-bottom:3px}
.cal-day.sun{color:var(--red)}.cal-day.sat{color:var(--blue)}
.cal-inc{font-size:10px;font-weight:600;color:var(--green)}
.cal-exp{font-size:10px;font-weight:600;color:var(--red)}
.cal-today{border:2px solid var(--purple);background:var(--purple-light)}
.cal-today .cal-day{color:var(--purple-dark)}
.cal-empty{background:none;border-color:transparent}
.fl{list-style:none}
.fi{display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid var(--border)}
.fi:last-child{border-bottom:none}
.fi-name{font-size:14px}
.fi-meta{font-size:11px;color:var(--text3);margin-top:1px}
.fixed-item{align-items:center;gap:10px}
.fixed-item-main{display:flex;align-items:center;gap:10px;flex:1;min-width:0}
.fixed-item-main>div{min-width:0}
.fixed-item-amt{display:flex;align-items:center;gap:6px;flex-shrink:0;max-width:100%;justify-content:flex-end}
.fixed-item-amt input{width:100px;min-width:0;text-align:right;padding:5px 8px;border:1px solid var(--border2);border-radius:6px;background:var(--surface2);font-size:13px}
.fixed-item-amt .var-check-btn{padding:3px 8px;border-radius:6px;font-size:11px;cursor:pointer;white-space:nowrap}
.budget-summary-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;margin-bottom:18px}
.budget-summary-amount{font-size:20px;font-weight:700;margin-top:5px;white-space:nowrap;word-break:keep-all;letter-spacing:-.3px}
.tab-row{display:flex;gap:2px;margin-bottom:18px;border-bottom:1px solid var(--border)}
.tab-btn{padding:8px 14px;border:none;background:none;color:var(--text2);font-size:13px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.tab-btn.active{color:var(--purple-dark);border-bottom-color:var(--purple);font-weight:500}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.month-label{font-size:18px;font-weight:700;min-width:110px}
.icon-btn{width:30px;height:30px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2)}
.icon-btn:hover{background:var(--surface2)}
/* ⑧ 콤마 표기용 텍스트 인풋 스타일 */
.num-input{text-align:right}
/* 저축 섹션 */
.save-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.save-row:last-child{border-bottom:none}
.save-label{font-size:13px;color:var(--text2);flex:1}
.save-bal{font-size:14px;font-weight:700;min-width:90px;text-align:right}
.save-input{width:110px;text-align:right;padding:5px 8px;border:1px solid var(--border);border-radius:6px;font-size:13px}
.pct-dot{display:inline-block;width:10px;height:10px;border-radius:2px;margin-right:5px}
@media(max-width:768px){
  .save-grid{grid-template-columns:1fr !important}
}
.mobile-only{display:none}
@media(max-width:768px){
  .mobile-only{display:flex}
  /* 저축 행 모바일 세로 정렬 */
  .save-row-inner{flex-wrap:wrap;gap:4px}
  .save-row-inner input{width:80px !important}
  .save-row-inner .btn-sm{padding:4px 6px !important;font-size:10px !important}
  /* 거래 내역 테이블 - 가로 스크롤 허용하되 내용 표시 */
  .tx-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
  table{font-size:12px;min-width:480px}
  td,th{padding:6px 6px;white-space:nowrap}
  /* 저축 그리드 */
  .save-grid{grid-template-columns:1fr !important}
}
/* 태블릿 (768px ~ 1024px) */
@media(max-width:1024px){
  .sidebar{width:64px}
  .logo-text,.logo-sub,.nav-label,.theme-btn{display:none}
  .logo{padding:16px 12px;justify-content:center}
  .nav{padding:8px 6px}
  .nav-item{justify-content:center;padding:10px}
  .page{padding:20px 18px;max-width:100%}
  /* 예산 관리 3단 → 1단 */
  #budget-container [style*="grid-template-columns:260px"]{
    grid-template-columns:1fr !important;
  }
  #budget-container .budget-summary-grid{gap:8px}
  #budget-container .budget-summary-amount{font-size:16px;line-height:1.2}
  /* 저축 투자비율 패널 숨기기 */
  .row2{flex-direction:column}
}
/* 모바일 (~ 768px) */
@media(max-width:768px){
  body{font-size:14px}
  .app{flex-direction:column}
  /* 사이드바를 하단 탭바로 변환 */
  .sidebar{
    width:100%;height:60px;flex-direction:row;
    border-right:none;border-top:1px solid var(--border);
    position:fixed;bottom:0;left:0;z-index:100;
    flex-shrink:0;
  }
  .logo{display:none}
  .nav{
    display:flex;flex-direction:row;align-items:center;
    justify-content:space-around;padding:0 4px;width:100%;
  }
  .nav-item{
    flex-direction:column;gap:3px;padding:6px 4px;
    border-radius:8px;font-size:10px;min-width:0;flex:1;
    justify-content:center;align-items:center;margin-bottom:0;
  }
  .nav-label{display:block;font-size:9px;color:inherit}
  .nav-icon{width:20px;height:20px}
  .main{padding-bottom:68px}
  .page{padding:14px 12px;max-width:100%}
  .page-title{font-size:18px}
  /* 그리드 조정 */
  .g4{grid-template-columns:repeat(2,1fr);gap:8px}
  .g3{grid-template-columns:repeat(2,1fr);gap:8px}
  #home-metrics,#cal-summary .g3,#fixed-summary .g3{grid-template-columns:repeat(3,minmax(0,1fr)) !important;gap:6px}
  #home-metrics .metric,#cal-summary .metric,#fixed-summary .metric{padding:10px 7px}
  #home-metrics .metric-label,#cal-summary .metric-label,#fixed-summary .metric-label{font-size:9px;line-height:1.2}
  #home-metrics .metric-value,#cal-summary .metric-value,#fixed-summary .metric-value{font-size:14px;white-space:nowrap;letter-spacing:-.4px}
  #home-metrics .metric-sub,#cal-summary .metric-sub,#fixed-summary .metric-sub{font-size:9px;line-height:1.2}
  .g2{grid-template-columns:1fr}
  .fg3{grid-template-columns:1fr 1fr;gap:8px}
  .fg2{grid-template-columns:1fr;gap:8px}
  .row2{flex-direction:column;gap:10px}
  .row2 .card{flex:none}
  /* 카드 */
  .card{padding:14px 12px}
  .metric{padding:12px}
  .metric-value{font-size:18px}
  /* 테이블 스크롤 */
  table{display:block;overflow-x:auto;white-space:nowrap}
  /* 캘린더 날짜칸 작게 */
  .cal-cell{min-height:48px;padding:5px 3px}
  .cal-day{font-size:11px}
  .cal-inc,.cal-exp{font-size:9px}
  /* 탭 */
  .tab-btn{padding:7px 10px;font-size:12px}
  /* 예산 관리 3단 → 1단 */
  #budget-container [style*="grid-template-columns:260px"]{
    grid-template-columns:1fr !important;
  }
  /* 저축 섹션 저축행 세로 정렬 */
  .save-row{flex-wrap:wrap;gap:6px}
  /* 버튼 */
  .btn{padding:8px 14px;font-size:13px}
  .btn-sm{padding:5px 8px;font-size:11px}
  /* 고정지출 입력칸 */
  .fixed-item{align-items:flex-start;gap:6px}
  .fixed-item-main{gap:6px}
  .fixed-item-main .fi-name{font-size:12px}
  .fixed-item-main .fi-meta{font-size:10px}
  .fixed-item-amt{max-width:48%;flex-wrap:wrap;justify-content:flex-end;gap:4px}
  .fixed-item-amt input{width:74px !important;font-size:11px !important;padding:4px 6px !important}
  .fixed-item-amt .var-check-btn{padding:2px 6px !important;font-size:10px !important;max-width:84px;overflow:hidden;text-overflow:ellipsis}
  /* 테마 버튼 - 모바일에서 다시 표시 */
  .theme-btn{display:none}
}

/* PIN 로그인 */
#pin-screen{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;align-items:center;justify-content:center}
#pin-screen.hidden{display:none}
.pin-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 36px 32px;width:320px;text-align:center;box-shadow:0 4px 24px rgba(0,0,0,.1)}
.pin-logo{font-size:22px;font-weight:700;margin-bottom:4px}
.pin-sub{font-size:13px;color:var(--text3);margin-bottom:28px}
.pin-dots{display:flex;gap:14px;justify-content:center;margin-bottom:28px}
.pin-dot{width:14px;height:14px;border-radius:50%;background:var(--border2);transition:background .15s}
.pin-dot.filled{background:var(--purple)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.pin-key{height:58px;border-radius:12px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:20px;font-weight:500;cursor:pointer;transition:all .12s;display:flex;align-items:center;justify-content:center;width:100%}
.pin-key:hover{background:var(--surface2)}
.pin-key:active{background:var(--purple-light);border-color:var(--purple)}
.pin-zero{grid-column:2}
.pin-del{font-size:16px;color:var(--text3)}
.pin-error{font-size:13px;color:var(--red);margin-top:14px;min-height:20px}

.save-li{padding:10px 0 !important;display:flex;align-items:center;gap:4px}
.save-li-inner{display:grid;grid-template-columns:minmax(0,1fr) auto auto auto;align-items:center;column-gap:4px;row-gap:4px;width:100%}
.save-li-name{font-size:13px;font-weight:600;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.save-li-main{display:inline-flex;align-items:center;gap:4px;min-width:0}
.save-li-main .save-li-name{flex:1}
.save-li-group{display:inline-flex;align-items:center;gap:3px;white-space:nowrap;min-width:0}
.save-li-group input{min-width:0}
.save-li-actions{display:inline-flex;align-items:center;justify-content:flex-end;gap:3px;justify-self:end;margin-left:auto}
@media(max-width:768px){
  .save-li-inner{grid-template-columns:minmax(0,1fr) auto;align-items:start}
  .save-li-group.save-li-bal{justify-self:end}
  .save-li-group.save-li-monthly{grid-column:1}
  .save-li-actions{grid-column:2;justify-self:end}
  .save-li-group input{width:72px !important;font-size:10px !important;padding:2px 4px !important}
  .save-li-name{font-size:11px;font-weight:600}
  .save-li-group span{font-size:10px}
  .save-li-actions .btn-sm{padding:2px 5px !important;font-size:10px !important}
}
/* 거래 내역: 모바일=카드리스트, PC=테이블 */
@media(max-width:768px){
  .tx-table-wrap{display:none}
  #tx-card-list{display:block}
}
@media(min-width:769px){
  #tx-card-list{display:none}
}

</style>
</head>
<body>
<div id="pin-screen">
  <div class="pin-box">
    <div class="pin-logo">범초하우스</div>
    <div class="pin-sub">PIN 번호를 입력하세요</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-pad">
      <button class="pin-key" onclick="pinInput('1')">1</button>
      <button class="pin-key" onclick="pinInput('2')">2</button>
      <button class="pin-key" onclick="pinInput('3')">3</button>
      <button class="pin-key" onclick="pinInput('4')">4</button>
      <button class="pin-key" onclick="pinInput('5')">5</button>
      <button class="pin-key" onclick="pinInput('6')">6</button>
      <button class="pin-key" onclick="pinInput('7')">7</button>
      <button class="pin-key" onclick="pinInput('8')">8</button>
      <button class="pin-key" onclick="pinInput('9')">9</button>
      <button class="pin-key pin-zero" onclick="pinInput('0')">0</button>
      <button class="pin-key pin-del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
  </div>
</div>
<div class="app">
<aside class="sidebar">
  <div class="logo">
    <div>
      <div class="logo-text">범초하우스</div>
      <div class="logo-sub">가계부 2026</div>
      <div id="sync-status" style="font-size:10px;color:var(--text3);margin-top:2px">연결 중…</div>
    </div>
    <!-- ⑦ 테마 버튼 -->
    <button class="theme-btn" id="theme-btn" onclick="toggleTheme()">☀ 라이트</button>
  </div>
  <nav class="nav">
    <button class="nav-item active" onclick="goPage('home')">
      <svg class="nav-icon" viewBox="0 0 20 20" fill="currentColor"><path d="M10.707 2.293a1 1 0 00-1.414 0l-7 7a1 1 0 001.414 1.414L4 10.414V17a1 1 0 001 1h2a1 1 0 001-1v-2a1 1 0 011-1h2a1 1 0 011 1v2a1 1 0 001 1h2a1 1 0 001-1v-6.586l.293.293a1 1 0 001.414-1.414l-7-7z"/></svg>

  const el=document.getElementById('sync-status');
  if(!el)return;

    syncing:{text:'동기화 중…',color:'var(--amber)'},

/* Firebase 저장 — 디바운스 적용 (연속 입력 시 500ms 후 1회만 전송) */
let fbSaveTimer=null;
function saveAll(){
  saveLocal();
  clearTimeout(fbSaveTimer);
  fbSaveTimer=setTimeout(()=>{
    setSyncStatus('syncing');
    db.ref(ROOT).set({
      txs,budgets,annualEvents,longSave,shortSave,
      fixedChecks:getFixedChecks(),
      fixedAmts:getFixedAmts(),
      fixedBudgetManual:localStorage.getItem('bch_fixed_budget_manual')||null,
      theme:localStorage.getItem('bch_theme')||null,
      _updated:Date.now()
    }).then(()=>setSyncStatus('ok'))
      .catch(()=>setSyncStatus('error'));
  },500);
}
/* 고정 지출 체크/금액 수집 헬퍼 */
function getFixedChecks(){
  const o={};
  allFixedList().forEach(i=>{const k=fixedKey(i);o[k]=localStorage.getItem(k)||'false';});
  /* 변동항목 월별 확인 체크도 저장 */
  VARIABLE_FIXED.forEach(name=>{const k=varFixedKey(name);const v=localStorage.getItem(k);if(v)o['var_'+k]=v;});
  return o;
}
function getFixedAmts(){
  const o={};
  allFixedList().forEach(i=>{const k=fixedKey(i)+'_amt';const v=localStorage.getItem(k);if(v)o[k]=v;});
  return o;
}
/* Firebase → 로컬 상태에 반영 */
function applyFirebaseData(data){
  if(!data)return;
  if(data.txs)txs=data.txs;
  if(data.budgets)budgets=data.budgets;
  if(data.annualEvents)annualEvents=data.annualEvents;
  if(data.longSave)longSave=data.longSave;
  if(data.shortSave)shortSave=data.shortSave;
  if(data.fixedChecks)Object.entries(data.fixedChecks).forEach(([k,v])=>{
    if(k.startsWith('var_'))localStorage.setItem(k.slice(4),v);
    else localStorage.setItem(k,v);
  });
  if(data.fixedAmts)Object.entries(data.fixedAmts).forEach(([k,v])=>localStorage.setItem(k,v));
  if(data.fixedBudgetManual)localStorage.setItem('bch_fixed_budget_manual',data.fixedBudgetManual);
  if(data.theme){
    localStorage.setItem('bch_theme',data.theme);
    if(data.theme==='dark')document.body.classList.add('dark');
    else document.body.classList.remove('dark');
  }
  saveLocal();
}
function fmt(n){return Math.round(n).toLocaleString('ko-KR')+'원'}
function fmtN(n){return Math.round(n).toLocaleString('ko-KR')}
function fmtShort(n){
  const v=Math.abs(Math.round(n));
  if(v>=10000000)return(v/10000000).toFixed(1)+'천만';
  if(v>=10000)return Math.round(v/10000)+'만';
  return v.toLocaleString()+'원';
}
function p2(n){return String(n).padStart(2,'0')}
function todayStr(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`}
function curMonth(){const d=new Date();return`${d.getFullYear()}-${p2(d.getMonth()+1)}`}
function monthlyData(){
  const m={};
  txs.forEach(t=>{
    const k=t.date.slice(0,7);
    if(!m[k])m[k]={income:0,expense:0,cats:{},incomeByDay:{},expByDay:{}};
    if(t.type==='income'){
      m[k].income+=t.amt;
      m[k].incomeByDay[t.date]=(m[k].incomeByDay[t.date]||0)+t.amt;
    } else {
      m[k].expense+=t.amt;
      m[k].cats[t.cat]=(m[k].cats[t.cat]||0)+t.amt;
      m[k].expByDay[t.date]=(m[k].expByDay[t.date]||0)+t.amt;
    }
  });
  return m;
}
function dc(id){if(charts[id]){charts[id].destroy();delete charts[id];}}
function allFixedList(){return Object.values(FIXED).flat();}
function fixedKey(item){return`fx_${item.name}_${item.day}`;}
function getFixedAmt(item){return parseInt(localStorage.getItem(fixedKey(item)+'_amt'))||item.amt;}
function totalVarBudget(){
  let s=0;
  for(const items of Object.values(BUDGET_GROUPS))s+=items.reduce((a,c)=>a+(budgets[c]||0),0);
  return s;
}
/* ⑧ 콤마 포맷 */
function formatNumInput(el){
  const raw=el.value.replace(/[^0-9]/g,'');

}
function parseNum(val){return parseInt(String(val).replace(/[^0-9]/g,''))||0;}

function goPage(p){
  commitPendingFields();
  document.querySelectorAll('.page').forEach(e=>e.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(e=>e.classList.remove('active'));
  document.getElementById('page-'+p).classList.add('active');
  const idx={home:0,input:1,calendar:2,budget:3,fixed:4,savings:5};
  document.querySelectorAll('.nav-item')[idx[p]].classList.add('active');
  ({home:renderHome,input:renderInput,calendar:renderCalendar,budget:renderBudget,fixed:renderFixed,savings:renderSavings})[p]();
}
function commitActiveField(){
  const el=document.activeElement;
  if(!el)return;
  const tag=el.tagName;
  if(tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA'){
    try{el.dispatchEvent(new Event('change',{bubbles:true}));}catch(e){}
    try{el.blur();}catch(e){}
    if(el.dataset)delete el.dataset.dirty;
  }
}
function commitDirtyFields(){
  document.querySelectorAll('input[data-dirty=\"1\"],select[data-dirty=\"1\"],textarea[data-dirty=\"1\"]').forEach(el=>{
    try{el.dispatchEvent(new Event('change',{bubbles:true}));}catch(e){}
    try{el.blur();}catch(e){}
    if(el.dataset)delete el.dataset.dirty;
  });
}
function commitPendingFields(){
  commitActiveField();
  commitDirtyFields();
}
document.addEventListener('input',e=>{
  const el=e.target;
  if(!el||!el.tagName)return;
  const tag=el.tagName;
  if((tag==='INPUT'||tag==='SELECT'||tag==='TEXTAREA')&&el.dataset)el.dataset.dirty='1';
},true);
document.addEventListener('change',e=>{
  const el=e.target;
  if(el&&el.dataset)delete el.dataset.dirty;
},true);
window.addEventListener('pagehide',commitPendingFields);
document.addEventListener('visibilitychange',()=>{
  if(document.visibilityState==='hidden')commitPendingFields();
});

function renderHome(){
  const m=curMonth();
  const data=monthlyData()[m]||{income:0,expense:0,cats:{}};
  document.getElementById('home-sub').textContent=m.replace('-','년 ')+'월 현황';

  /* 유동 지출 잔액 계산 — 순지출(지출-수입) 기준 */
  const varBudget=totalVarBudget();
  const grossExp=data.expense;
  const monthInc=data.income||0;
  const netSpent=Math.max(0,grossExp-monthInc);   /* 수입 차감 */
  const varRemain=varBudget-netSpent;
  const varPct=varBudget>0?Math.max(0,Math.min(100,Math.round(varRemain/varBudget*100))):0;

  /* 하루 권장 금액 — 수입 반영된 varRemain 사용 */
  const now=new Date();
  const lastDay=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(1,lastDay-now.getDate()+1);
  const daily=Math.max(0,Math.round(varRemain/daysLeft));

  /* 고정 지출 잔액 */
  const allFixed=allFixedList();
  let fixedTotal=0,fixedDone=0;
  allFixed.forEach(i=>{
    const amt=getFixedAmt(i);
    fixedTotal+=amt;
    if(localStorage.getItem(fixedKey(i))==='true')fixedDone+=amt;
  });
  const fixedRemain=fixedTotal-fixedDone;
  const fixedPct=fixedTotal>0?Math.max(0,Math.min(100,Math.round(fixedRemain/fixedTotal*100))):0;

  document.getElementById('home-metrics').innerHTML=`
    <div class="metric">
      <div class="metric-label">유동 지출 잔액</div>
      <div class="metric-value" style="color:${varPct<20?'var(--red)':varPct<50?'var(--amber)':'var(--purple-dark)'}">${fmt(varRemain)}</div>
      <div class="metric-sub">${varPct}% 남음${monthInc?` · 수입 ${fmtShort(monthInc)} 반영`:''}</div>
    </div>
    <div class="metric">
      <div class="metric-label">하루 권장 금액 (${daysLeft}일 남음)</div>
      <div class="metric-value" style="color:var(--blue)">${fmt(daily)}</div>
      <div class="metric-sub">순지출 기준${monthInc?' (수입 차감)':''}</div>
    </div>
    <div class="metric">
      <div class="metric-label">고정 지출 잔액</div>
      <div class="metric-value" style="color:${fixedPct<30?'var(--green)':'var(--amber)'}">${fmt(fixedRemain)}</div>
      <div class="metric-sub">${fixedPct}% 미처리 · 총 ${fmtShort(fixedTotal)}</div>
    </div>`;

  /* 도넛 */
  const cats=data.cats,catKeys=Object.keys(cats);
  const total=Object.values(cats).reduce((a,b)=>a+b,0)||1;
  document.getElementById('home-legend').innerHTML=catKeys.map((k,i)=>`
    <span style="display:flex;align-items:center;gap:4px">
      <span style="width:10px;height:10px;border-radius:2px;background:${CAT_COLORS[i%CAT_COLORS.length]}"></span>
      ${k} ${Math.round(cats[k]/total*100)}%
    </span>`).join('');
  dc('donut-home');
  if(catKeys.length)charts['donut-home']=new Chart(document.getElementById('donut-home'),{
    type:'doughnut',
    data:{labels:catKeys,datasets:[{data:catKeys.map(k=>cats[k]),backgroundColor:CAT_COLORS,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'65%'}
  });

  /* 최근 거래 */
  document.getElementById('home-recent').innerHTML=txs.slice(0,6).map(t=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border)">
      <div><div style="font-size:13px;font-weight:500">${t.desc||t.cat||'—'}</div>
        <div style="font-size:11px;color:var(--text3)">${t.date}${t.cat?' · '+t.cat:''}</div></div>
      <span style="font-size:13px;font-weight:700;color:${t.type==='income'?'var(--green)':'var(--red)'}">${t.type==='income'?'+':'-'}${fmt(t.amt)}</span>
    </div>`).join('')||'<div style="color:var(--text3);font-size:13px;padding:20px 0;text-align:center">거래 내역이 없어요</div>';

/* ==============================
   ③ 예산 관리
============================== */
function renderBudget(){
  const mStr=curMonth();
  const monthData=monthlyData()[mStr]||{cats:{}};

  let totalIncome=0,totalSaving=0;
  INCOME_GROUPS.forEach(c=>totalIncome+=(budgets[c]||0));
  SAVING_GROUPS.forEach(c=>totalSaving+=(budgets[c]||0));
  /* ③ 유동 지출 예산 = 지출 예산 설정 합산 */
  const varB=totalVarBudget();
  const fixedB=parseInt(localStorage.getItem('bch_fixed_budget_manual'))||allFixedList().reduce((s,i)=>s+getFixedAmt(i),0);
  const realIncome=totalIncome-totalSaving;
  const totalExp=varB+fixedB;
  const remaining=realIncome-totalExp;

  const now=new Date();
  const lastDay=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const daysLeft=Math.max(1,lastDay-now.getDate()+1);
  /* ⑥ 거래 내역의 실제 지출/수입 */
  const actualExp=Object.values(monthData.cats).reduce((s,v)=>s+v,0); /* 지출 합 */
  const actualInc=monthData.income||0; /* 수입 합 */
  const netSpentBudget=Math.max(0,actualExp-actualInc); /* 순지출 */
  const varRemain=varB-netSpentBudget;
  const daily=Math.max(0,Math.round(varRemain/daysLeft));

  const summaryHtml=`
    <div class="budget-summary-grid">
      <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid var(--green)">
        <div style="font-size:11px;color:var(--text3)">가용 수입</div>
        <div class="budget-summary-amount" style="color:var(--green)">${fmt(realIncome)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">총수입 − 적금·청약</div>
      </div>
      <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid var(--red)">
        <div style="font-size:11px;color:var(--text3)">예정 지출 합계</div>
        <div class="budget-summary-amount" style="color:var(--red)">${fmt(totalExp)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">유동 + 고정</div>
      </div>
      <div class="card" style="margin-bottom:0;text-align:center;border-top:3px solid var(--purple)">
        <div style="font-size:11px;color:var(--text3)">이달 예상 저축</div>
        <div class="budget-summary-amount" style="color:${remaining>=0?'var(--purple-dark)':'var(--red)'}">${fmt(remaining)}</div>
        <div style="font-size:10px;color:var(--text3);margin-top:3px">가용 수입 − 예정 지출</div>
      </div>
    </div>`;

  /* Col1 수입/적금 */
  let col1=`<div class="card" style="margin-bottom:0"><div class="card-title" style="font-size:14px">수입 / 적금</div>`;
  INCOME_GROUPS.forEach(cat=>{
    col1+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:12px;color:var(--text2);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cat}</span>
      <input type="text" class="num-input" value="${fmtN(budgets[cat]||0)}" oninput="formatNumInput(this)" onchange="setBudget('${cat}',this.value);renderBudget()"
        style="width:148px;text-align:right;padding:6px 9px;font-size:13px">
    </div>`;
  });
  col1+=`<div class="divider"></div>`;
  SAVING_GROUPS.forEach(cat=>{
    col1+=`<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
      <span style="font-size:12px;color:var(--purple-dark);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${cat}</span>
      <input type="text" class="num-input" value="${fmtN(budgets[cat]||0)}" oninput="formatNumInput(this)" onchange="setBudget('${cat}',this.value);renderBudget()"
        style="width:148px;text-align:right;padding:6px 9px;font-size:13px">
    </div>`;
  });
  col1+=`</div>`;

  /* ③ Col2 지출 예산 - 오른쪽에 합산 표기 */
  let col2=`<div class="card" style="margin-bottom:0"><div class="card-title" style="font-size:14px">지출 예산 설정 <span style="font-size:12px;color:var(--text3);font-weight:400">합계 ${fmt(varB)}</span></div>`;
  for(const[gn,items] of Object.entries(BUDGET_GROUPS)){
    const gSum=items.reduce((s,c)=>s+(budgets[c]||0),0);
    col2+=`<div style="font-size:12px;font-weight:600;color:var(--purple-dark);margin:12px 0 6px;display:flex;justify-content:space-between">
      <span>${gn}</span><span style="font-weight:400;color:var(--text3)">${fmt(gSum)}</span></div>`;
    items.forEach(cat=>{
      col2+=`<div style="display:grid;grid-template-columns:1fr auto;gap:8px;margin-bottom:7px;align-items:center">
        <span style="font-size:12px;color:var(--text2)">${cat}</span>
        <input type="text" class="num-input" value="${fmtN(budgets[cat]||0)}" oninput="formatNumInput(this)"
          onchange="setBudget('${cat}',this.value);renderBudget()"
          style="width:90px;text-align:right;padding:5px 8px;font-size:13px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface)">
      </div>`;
    });
  }
  /* ⑤ 고정 지출 직접 입력 */
  col2+=`<div class="divider"></div>
    <div style="font-size:12px;font-weight:600;color:var(--blue);margin-bottom:8px">고정 지출 (직접 입력)</div>
    <div style="display:flex;align-items:center;gap:8px">
      <span style="font-size:12px;flex:1;color:var(--text2)">월 고정지출 합계</span>
      <input type="text" class="num-input" value="${fmtN(fixedB)}" oninput="formatNumInput(this)"
        onchange="localStorage.setItem('bch_fixed_budget_manual',parseNum(this.value));renderBudget();renderHome()"
        style="width:120px;text-align:right;font-weight:700;color:var(--blue);padding:5px 8px;font-size:13px">
    </div>
  </div>`;

  /* ③② col3 예산 대비 잔액 — txs에서 대분류(EXPENSE_CATS) 기준으로 직접 집계 */
  const mStr2=curMonth();
  const expByBigCat={};
  txs.filter(t=>t.date.startsWith(mStr2)&&t.type==='expense').forEach(t=>{
    expByBigCat[t.cat]=(expByBigCat[t.cat]||0)+t.amt;
  });

  let col3=`<div class="card" style="margin-bottom:0">
    <div class="card-title" style="font-size:14px">예산 대비 잔액</div>`;

  /* 대분류별 예산 = BUDGET_GROUPS 소분류 합산, 지출 = txs 대분류 합산 */
  for(const[gn,items] of Object.entries(BUDGET_GROUPS)){
    const gBudget=items.reduce((s,c)=>s+(budgets[c]||0),0);
    const gSpent=expByBigCat[gn]||0; /* 대분류명으로 조회 */
    const gRemain=gBudget-gSpent;
    const pct=gBudget>0?Math.max(0,Math.min(100,Math.round(gRemain/gBudget*100))):0;
    const barCls=pct<20?'over':pct<50?'warn':'ok';
    col3+=`<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:5px">
        <span style="font-weight:500">${gn}</span>
        <span style="font-weight:700;color:${pct<20?'var(--red)':pct<50?'var(--amber)':'var(--green)'}">${pct}% 남음</span>
      </div>
      <div class="pw" style="margin-bottom:4px"><div class="pb ${barCls}" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--text3)">
        <span>사용 ${fmt(gSpent)}</span><span>예산 ${fmt(gBudget)}</span>
      </div>
    </div>`;
  }
  /* ⑥ 이번달 수입 표기 */
  col3+=`<div class="divider"></div>
    ${actualInc>0?`<div style="display:flex;justify-content:space-between;font-size:13px;padding:6px 0;margin-bottom:8px;background:var(--green-light);border-radius:8px;padding:8px 10px;">
      <span style="color:var(--green);font-weight:500">이번 달 수입 반영</span>
      <span style="color:var(--green);font-weight:700">+${fmt(actualInc)}</span>
    </div>`:''}
    <div style="background:var(--purple-light);padding:14px;border-radius:10px;text-align:center">
      <div style="font-size:11px;color:var(--purple-dark);margin-bottom:3px">오늘부터 말일(${daysLeft}일)</div>
      <div style="font-size:12px;color:var(--text2)">하루 권장 사용 금액</div>
      <div style="font-size:22px;font-weight:700;color:var(--purple-dark);margin-top:4px">${fmt(daily)}</div>
      ${actualInc>0?`<div style="font-size:10px;color:var(--purple-dark);margin-top:3px;opacity:.8">순지출 기준 (수입 차감 반영)</div>`:''}
    </div>
  </div>`;

  document.getElementById('budget-container').innerHTML=summaryHtml+
    `<div style="display:grid;grid-template-columns:260px 1fr 260px;gap:14px;align-items:start">${col1}${col2}${col3}</div>`;
}
function setBudget(cat,val){budgets[cat]=parseNum(val);saveAll();}

/* ==============================
   ④⑥ 고정 지출
============================== */
function setFixedTab(tab){
  currentFixedTab=tab;
  document.querySelectorAll('#fixed-tabs .tab-btn').forEach(b=>b.classList.toggle('active',b.textContent===tab));
  renderFixed();
}
function toggleFixed(key){
  localStorage.setItem(key,localStorage.getItem(key)!=='true');
  saveAll();renderFixed();renderHome();
}
function updateFixedAmt(key,val){
  if(val==='')return;
  localStorage.setItem(key+'_amt',parseNum(val));
  saveAll();renderFixed();renderHome();
}
function toggleAllFixed(status){
  allFixedList().forEach(i=>localStorage.setItem(fixedKey(i),status));
  renderFixed();renderHome();
}
function renderFixed(){
  const all=allFixedList();
  const todayDay=new Date().getDate();
  let doneAmt=0,doneCount=0,pendingAmt=0,pendingCount=0;
  const todayItems=[];
  all.forEach(item=>{
    const k=fixedKey(item),isDone=localStorage.getItem(k)==='true',amt=getFixedAmt(item);
    if(isDone){doneAmt+=amt;doneCount++;}else{pendingAmt+=amt;pendingCount++;}
    if(item.day===todayDay)todayItems.push({...item,curAmt:amt});
  });
  const total=doneAmt+pendingAmt;

  /* 오늘 알림 */
  const tEl=document.getElementById('fixed-today-alert');
  if(todayItems.length){
    const todayTotal=todayItems.reduce((s,i)=>s+i.curAmt,0);
    tEl.innerHTML=`<div style="background:var(--red-light);border:1px solid var(--red);border-radius:12px;padding:14px 16px;margin-bottom:16px">
      <div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:8px">오늘(${todayDay}일) 출금 예정 · ${fmt(todayTotal)}</div>
      <div style="display:flex;flex-direction:column;gap:5px">
        ${todayItems.map(i=>`<div style="display:flex;justify-content:space-between;font-size:13px">
          <span style="color:var(--text2)">${i.name}</span>
          <span style="font-weight:600;color:var(--red)">${fmt(i.curAmt)}</span>
        </div>`).join('')}
      </div>
    </div>`;
  } else {
    tEl.innerHTML=`<div class="alert ag" style="margin-bottom:12px">오늘(${todayDay}일) 출금 예정 없음</div>`;
  }

  /* ④ fixed-summary 하나로 통합 — 중복 g3 제거, 건수 표기 포함 */
  const pct=total>0?Math.max(0,Math.min(100,Math.round(pendingAmt/total*100))):0;
  const fBarCls=pct<30?'ok':pct<70?'warn':'over';
  document.getElementById('fixed-summary').innerHTML=`
    <div class="g3" style="margin-bottom:10px">
      <div class="metric">
        <div class="metric-label">이달 고정 합계</div>
        <div class="metric-value" style="color:var(--blue)">${fmt(total)}</div>
      </div>
      <div class="metric">
        <div class="metric-label">처리 완료</div>
        <div class="metric-value" style="color:var(--green)">${fmt(doneAmt)}</div>
        <div class="metric-sub">${doneCount}건 완료</div>
      </div>
      <div class="metric">
        <div class="metric-label">처리 예정 (잔여)</div>
        <div class="metric-value" style="color:${pct>60?'var(--amber)':'var(--text)'}">${fmt(pendingAmt)}</div>
        <div class="metric-sub">${pendingCount}건 남음</div>
      </div>
    </div>
    <div class="pw" style="height:9px;margin-bottom:18px"><div class="pb ${fBarCls}" style="width:${pct}%"></div></div>`;

  /* 리스트 */
  let items=currentFixedTab==='전체'?[...all]:[...(FIXED[currentFixedTab]||[])];
  items.sort((a,b)=>a.day-b.day);
  document.getElementById('fixed-list').innerHTML=`
    <div style="display:flex;gap:10px;margin-bottom:12px">
      <button class="btn btn-sm" onclick="toggleAllFixed(true)">전체 체크</button>
      <button class="btn btn-sm" onclick="toggleAllFixed(false)">전체 해제</button>
    </div>
    <div class="card">
      <ul class="fl">
      ${items.map(item=>{
        const k=fixedKey(item),isDone=localStorage.getItem(k)==='true',amt=getFixedAmt(item);
        const isToday=item.day===todayDay;
        return`<li class="fi fixed-item" style="opacity:${isDone?.6:1};${isToday?'background:var(--amber-light);border-radius:8px;padding:10px 8px;margin:0 -8px;':''}">
          <div class="fixed-item-main">
            <input type="checkbox" ${isDone?'checked':''} onchange="toggleFixed('${k}')" style="width:17px;height:17px;cursor:pointer">
            <div>
              <div class="fi-name" style="${isDone?'text-decoration:line-through;':''}${isToday?'color:var(--amber);font-weight:600':''}">${isToday?'★ ':''}${item.name}</div>
              <div class="fi-meta">매달 ${item.day}일</div>
            </div>
          </div>
          <div class="fixed-item-amt">
            ${isVarFixed(item.name)?`<button class="var-check-btn" onclick="toggleVarCheck('${item.name}')"
              style="padding:3px 8px;border-radius:6px;border:1px solid ${isVarChecked(item.name)?'var(--green)':'var(--border2)'};background:${isVarChecked(item.name)?'var(--green-light)':'var(--surface)'};color:${isVarChecked(item.name)?'var(--green)':'var(--text3)'};font-size:11px;cursor:pointer;white-space:nowrap">
              ${isVarChecked(item.name)?'✓ 확인':'이번달 확인'}
            </button>`:''}
            <input type="text" value="${fmtN(amt)}" oninput="formatNumInput(this)" onchange="updateFixedAmt('${k}',this.value)"
              style="text-align:right">
            <span style="font-size:12px;color:var(--text3)">원</span>
          </div>
        </li>`;
      }).join('')}
      </ul>
    </div>`;
}

              <span style="color:var(--text2)">${n}</span>
              <span style="margin-left:auto;font-weight:600">${pct}%</span>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">월별 저축 추이</div>
    <div style="position:relative;height:200px"><canvas id="save-trend" role="img" aria-label="월별 저축 추이">저축 추이</canvas></div>
  </div>`;

  document.getElementById('save-content').innerHTML=html;

  /* 도넛 차트 */
  dc('save-donut');
  if(shortTotal>0)charts['save-donut']=new Chart(document.getElementById('save-donut'),{
    type:'doughnut',
    data:{labels:shortNames,datasets:[{data:shortNames.map(n=>shortSave[n].bal),backgroundColor:shortColors,borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},cutout:'60%'}
  });

  /* 월별 저축 추이 — 거래 내역 + 저축 +/- 기록 모두 반영, 데이터 없어도 표시 */
  const monthly=monthlyData();
  /* 최근 6개월 라벨 생성 (거래 없어도 표시) */
  const trendLabels=[];
  for(let i=5;i>=0;i--){
    const d=new Date();d.setDate(1);d.setMonth(d.getMonth()-i);
    trendLabels.push(`${d.getFullYear()}-${p2(d.getMonth()+1)}`);
  }
  const saveTrend=trendLabels.map(m=>{
    /* 거래 내역 기반 + 저축 +/- 누계 모두 합산 */
    const md=monthly[m];
    let base=md?Math.max(0,md.income-md.expense):0;
    /* longSave/shortSave의 thisMonth 누계도 더하기 */
    const mk='savedThisMonth_'+m;
    Object.values(longSave).forEach(v=>{if(v[mk])base+=(v[mk]||0);});
    Object.values(shortSave).forEach(v=>{if(v[mk])base+=(v[mk]||0);});
    return base;
  });
  dc('save-trend');
  const trendCanvas=document.getElementById('save-trend');
  const trendCtx=trendCanvas.getContext('2d');
  const trendFill=trendCtx.createLinearGradient(0,0,0,200);
  trendFill.addColorStop(0,'rgba(24,95,165,0.35)');
  trendFill.addColorStop(1,'rgba(24,95,165,0.06)');
  charts['save-trend']=new Chart(document.getElementById('save-trend'),{
    type:'line',
    data:{
      labels:trendLabels,
      datasets:[{
        label:'월 저축액',
        data:saveTrend,
        borderColor:'#0E6E8A',
        backgroundColor:trendFill,
        borderWidth:3,
        tension:0.35,
        fill:true,
        pointRadius:4,
        pointHoverRadius:5,
        pointBackgroundColor:'#0E6E8A',
        pointBorderColor:'#0E6E8A',
        pointBorderWidth:1
      }]
    },
    options:{
      responsive:true,
      maintainAspectRatio:false,
      plugins:{legend:{display:false},tooltip:{callbacks:{label:(ctx)=>` ${fmt(ctx.parsed.y)}`}}},
      scales:{
        x:{ticks:{autoSkip:false,maxRotation:35,minRotation:35,color:'#8a8a8a'},grid:{display:false}},
        y:{ticks:{callback:v=>Math.round(v/10000)+'만',color:'#8a8a8a'},beginAtZero:true,grid:{color:'rgba(120,120,120,0.18)'}}
      }
    }
  });
}
function updateSave(group,name,field,val){
  const store=group==='long'?longSave:shortSave;
  store[name][field]=parseNum(val);
  saveAll();renderSavings();
}
function addSave(group,name,dir){
  const store=group==='long'?longSave:shortSave;
  const monthly=store[name].monthly||0;
  const delta=monthly*dir;
  store[name].bal=Math.max(0,store[name].bal+delta);
  /* 이번달 저축 누계 추적 */
  const mKey='savedThisMonth_'+curMonth();
  if(!store[name][mKey])store[name][mKey]=0;
  store[name][mKey]+=delta;
  saveAll();renderSavings();
}

/* ==============================
   PIN 로그인
============================== */
const CORRECT_PIN='4925';
let pinBuffer='';
let pinUnlocked=false; /* 탭 메모리에만 저장 — 탭 닫으면 초기화 */

function pinInput(n){
  if(pinBuffer.length>=4)return;
  pinBuffer+=n;
  updatePinDots();
  if(pinBuffer.length===4)setTimeout(checkPin,120);
}
function pinDel(){
  pinBuffer=pinBuffer.slice(0,-1);
  updatePinDots();
  document.getElementById('pin-error').textContent='';
}
function updatePinDots(){
  for(let i=0;i<4;i++){
    document.getElementById('d'+i).classList.toggle('filled',i<pinBuffer.length);
  }
}
function checkPin(){
  if(pinBuffer===CORRECT_PIN){
    pinUnlocked=true;
    document.getElementById('pin-screen').classList.add('hidden');
  } else {
    document.getElementById('pin-error').textContent='PIN 번호가 틀렸어요. 다시 입력해주세요.';
    for(let i=0;i<4;i++){
      const d=document.getElementById('d'+i);
      d.style.background='var(--red)';
    }
    setTimeout(()=>{
      pinBuffer='';
      updatePinDots();
      for(let i=0;i<4;i++)document.getElementById('d'+i).style.background='';
    },600);
  }
}
/* 탭 닫힘/새로고침 감지 — 새로고침은 통과, 탭 닫으면 잠금 */
window.addEventListener('beforeunload',()=>{
  if(!pinUnlocked)return;
  /* 새로고침(navigation)과 탭 닫기를 구분 */
  sessionStorage.setItem('bch_tab_alive','1');
});
/* 새로고침이면 세션 유지, 탭 새로 열면 잠금 */
const isRefresh=sessionStorage.getItem('bch_tab_alive')==='1';
sessionStorage.removeItem('bch_tab_alive');
if(isRefresh){
  pinUnlocked=true;
  document.getElementById('pin-screen').classList.add('hidden');
}

/* ==============================
   초기화 — Firebase에서 먼저 로드, 실시간 변경 감지
============================== */
document.getElementById('tx-date').value=todayStr();
updateCats();
/* 로컬 캐시로 즉시 렌더 (오프라인에서도 빠르게 표시) */
renderHome();
setSyncStatus('syncing');

/* Firebase 실시간 리스너 — 다른 기기에서 변경되면 자동으로 반영 */
db.ref(ROOT).on('value', snapshot=>{
  const data=snapshot.val();
  if(data && data._updated){
    /* 원격 데이터가 내 로컬보다 최신이거나, 첫 로드인 경우만 반영 */
    const localUpdated=parseInt(localStorage.getItem('bch_last_updated')||'0');
    if(data._updated>localUpdated || !fbReady){
      applyFirebaseData(data);
      localStorage.setItem('bch_last_updated',data._updated);
    }
  }
  if(!fbReady){
    fbReady=true;
    /* 첫 로드 완료 후 전체 리렌더 */
    const activePage=document.querySelector('.page.active')?.id?.replace('page-','');
    if(activePage)({home:renderHome,input:renderInput,calendar:renderCalendar,budget:renderBudget,fixed:renderFixed,savings:renderSavings})[activePage]?.();
  }
  setSyncStatus('ok');
},err=>{
  console.warn('Firebase 연결 실패, 로컬 모드로 동작:', err);
  setSyncStatus('offline');
  fbReady=true;
});

/* 오프라인 감지 */
db.ref('.info/connected').on('value',snap=>{
  if(snap.val()===false)setSyncStatus('offline');
});
</script>
